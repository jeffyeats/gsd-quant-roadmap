name: Daily Reminder

on:
  schedule:
    # Run at both possible UTC times for 7:30 AM ET; Python guard sends only in the ET target window.
    # 11:30 UTC = 7:30 AM EDT
    - cron: "30 11 * * *"
    # 12:30 UTC = 7:30 AM EST
    - cron: "30 12 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  send-reminder:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send daily reminder
        env:
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
          ENFORCE_ET_SEND_WINDOW: "1"
          TARGET_ET_HOUR: "7"
          TARGET_ET_MINUTE: "30"
        run: python src/send_reminder.py
